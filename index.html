<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPA Skin Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6" id="app-container">
        
        <div id="view-login">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">EPA Skin Login</h2>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">MDID (รหัส 5 หลัก)</label>
                <input type="number" id="mdid-input" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring" placeholder="ระบุ MDID">
            </div>
            <button onclick="app.login()" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none">เข้าสู่ระบบ</button>
        </div>

        <div id="view-menu" class="hidden">
            <div class="mb-6 border-b pb-4">
                <h2 class="text-xl font-bold text-gray-800">สวัสดี <span id="display-name" class="text-blue-600"></span></h2>
                <p class="text-sm text-gray-600">สถาบัน: <span id="display-inst"></span> | สถานะ: <span id="display-role"></span></p>
            </div>
            <div class="space-y-3" id="menu-buttons">
                </div>
            <button onclick="app.logout()" class="w-full mt-6 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">ออกจากระบบ</button>
        </div>

        <div id="view-resident-epa" class="hidden">
            <h2 class="text-xl font-bold mb-4">สร้างรายการ EPA</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold mb-1">เลือก EPA</label>
                    <select id="sel-epaid" class="w-full border rounded p-2"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Note (บันทึกเพิ่มเติม)</label>
                    <textarea id="txt-epanote" class="w-full border rounded p-2" rows="2" placeholder="ระบุรายละเอียด..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">ผู้ประเมิน (Instructor)</label>
                    <select id="sel-instructor" class="w-full border rounded p-2"></select>
                </div>
                <div class="flex space-x-2 pt-4">
                    <button onclick="app.saveEpa()" class="flex-1 bg-green-500 text-white py-2 rounded font-bold">บันทึกข้อมูล</button>
                    <button onclick="app.showView('view-menu')" class="flex-1 bg-gray-400 text-white py-2 rounded font-bold">กลับ</button>
                </div>
            </div>
        </div>

        <div id="view-instructor-list" class="hidden">
            <h2 class="text-xl font-bold mb-4">รายการรอประเมิน</h2>
            <div id="task-container" class="space-y-3 mb-4 max-h-96 overflow-y-auto"></div>
            <button onclick="app.showView('view-menu')" class="w-full bg-gray-400 text-white py-2 rounded font-bold">กลับหน้าหลัก</button>
        </div>

        <div id="view-eval-form" class="hidden">
            <h2 class="text-xl font-bold mb-2">ประเมิน <span id="eval-res-name" class="text-blue-600"></span></h2>
            <p class="text-sm font-semibold mb-4 text-gray-700" id="eval-epa-desc"></p>
            <p class="text-sm mb-4">เกณฑ์ผ่าน: Level <span id="eval-min-level" class="font-bold text-red-500"></span></p>

            <div class="mb-4">
                <label class="block text-sm font-bold mb-1">คะแนน (1-5)</label>
                <select id="eval-score" class="w-full border rounded p-2 text-lg" onchange="app.checkEvalScore()">
                    <option value="">-- เลือกคะแนน --</option>
                    <option value="1">1</option><option value="2">2</option>
                    <option value="3">3</option><option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div id="eval-reason-section" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded">
                <label class="block text-sm font-bold text-red-700 mb-2">ระบุเหตุผลที่ไม่ผ่าน (เลือกได้หลายข้อ)</label>
                <div id="reason-checkboxes" class="space-y-2 text-sm"></div>
            </div>

            <div class="flex space-x-2">
                <button onclick="app.submitEvaluation()" class="flex-1 bg-blue-500 text-white py-2 rounded font-bold">บันทึกผล</button>
                <button onclick="app.showView('view-instructor-list')" class="flex-1 bg-gray-400 text-white py-2 rounded font-bold">ยกเลิก</button>
            </div>
        </div>

        <div id="view-staff-dashboard" class="hidden">
            <h2 class="text-xl font-bold mb-4">Dashboard: EPA Progress</h2>
            <canvas id="epaChart" width="400" height="300"></canvas>
            <button onclick="app.showView('view-menu')" class="w-full mt-6 bg-gray-400 text-white py-2 rounded font-bold">กลับหน้าหลัก</button>
        </div>

    </div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz6JYcQSn2-nc-7HC4aQS0cXsXSjopokajRmgwD7UbIKXUXWeomZ7qv5greIcAiJ5Sm/exec';

const app = {
    user: null,
    currentEvalTask: null,
    currentEvalCriteria: null,
    chartInstance: null,

    // ================== Core Utilities ==================
    showView: (id) => {
        document.querySelectorAll('#app-container > div').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },

    api: async (payload, loadingMsg = 'กำลังประมวลผล...') => {
        Swal.fire({ title: loadingMsg, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            Swal.close();
            if(!data.success) throw new Error(data.message);
            return data;
        } catch (err) {
            Swal.fire('ข้อผิดพลาด', err.message || 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', 'error');
            return null;
        }
    },

    // ================== Flows ==================
    login: async () => {
        const mdid = document.getElementById('mdid-input').value;
        if (!mdid) return Swal.fire('แจ้งเตือน', 'กรุณาระบุ MDID', 'warning');
        
        const data = await app.api({ action: 'login', mdid: mdid }, 'กำลังตรวจสอบข้อมูล...');
        if (data) {
            app.user = data.user;
            document.getElementById('display-name').innerText = app.user.name;
            document.getElementById('display-inst').innerText = app.user.institute;
            document.getElementById('display-role').innerText = app.user.role;
            app.renderMenu();
            app.showView('view-menu');
        }
    },

    logout: () => {
        app.user = null;
        document.getElementById('mdid-input').value = '';
        app.showView('view-login');
    },

    renderMenu: () => {
        const container = document.getElementById('menu-buttons');
        container.innerHTML = '';
        const role = app.user.role; // e.g. "instructor,staff"

        if (role.includes('resident')) {
            container.innerHTML += `<button onclick="app.loadResidentForm()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded text-left">📝 ส่งรายงาน EPA ใหม่</button>`;
        }
        if (role.includes('instructor')) {
            container.innerHTML += `<button onclick="app.loadInstructorTasks()" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded text-left">✅ รอประเมิน (Instructor)</button>`;
        }
        if (role.includes('staff')) {
            container.innerHTML += `<button onclick="app.loadDashboard()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded text-left">📊 ดู Dashboard (Staff)</button>`;
        }
    },

// ================== Resident Flow ==================
    residentContext: null, // เก็บข้อมูลไว้ใช้ตอนเปลี่ยน Dropdown

    loadResidentForm: async () => {
        const data = await app.api({ action: 'get_resident_data', user: app.user });
        if (data) {
            app.residentContext = data; // เก็บข้อมูลทั้งหมดไว้ในตัวแปร
            
            const selEpa = document.getElementById('sel-epaid');
            // ใส่ onchange ให้เมื่อเปลี่ยน EPA จะไปอัปเดตรายชื่ออาจารย์
            selEpa.innerHTML = '<option value="">-- เลือกรายการ EPA --</option>' + 
                               data.epas.map(e => `<option value="${e.id}">${e.id}: ${e.desc}</option>`).join('');
            
            selEpa.setAttribute('onchange', 'app.filterInstructors()');
            
            document.getElementById('sel-instructor').innerHTML = '<option value="">-- กรุณาเลือก EPA ก่อน --</option>';
            document.getElementById('txt-epanote').value = '';
            app.showView('view-resident-epa');
        }
    },

    filterInstructors: () => {
        const selEpaId = document.getElementById('sel-epaid').value;
        const selInstructor = document.getElementById('sel-instructor');
        
        if (!selEpaId) {
            selInstructor.innerHTML = '<option value="">-- กรุณาเลือก EPA ก่อน --</option>';
            return;
        }

        // ดึงข้อมูลโควต้าของ EPA ที่เลือก
        const epaInfo = app.residentContext.epas.find(e => e.id === selEpaId);
        const maxEval = epaInfo.maxEval;
        const passedData = app.residentContext.passedCounts[selEpaId] || {};

        let availableInstructors = [];

        // เช็คอาจารย์ทีละคนว่าประเมินผ่านเกินโควต้าหรือยัง
        app.residentContext.instructors.forEach(inst => {
            let passCount = passedData[inst.mdid] || 0;
            if (passCount < maxEval) {
                availableInstructors.push(inst);
            }
        });

        // อัปเดต Dropdown อาจารย์
        if (availableInstructors.length === 0) {
             selInstructor.innerHTML = '<option value="">-- โควต้าอาจารย์ทุกท่านเต็มแล้ว --</option>';
             selInstructor.disabled = true;
        } else {
             selInstructor.disabled = false;
             selInstructor.innerHTML = availableInstructors.map(i => `<option value="${i.mdid}">${i.name}</option>`).join('');
        }
    },

    // ================== Instructor Flow ==================
    loadInstructorTasks: async () => {
        const data = await app.api({ action: 'get_eval_tasks', user: app.user }, 'โหลดรายการ...');
        if (data) {
            const container = document.getElementById('task-container');
            if(data.tasks.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">ไม่มีรายการรอประเมิน</p>';
            } else {
                container.innerHTML = data.tasks.map(t => `
                    <div class="border p-3 rounded shadow-sm bg-white cursor-pointer hover:bg-blue-50" onclick='app.openEvalForm(${JSON.stringify(t)})'>
                        <div class="font-bold text-blue-700">${t.resident_name} <span class="text-xs text-gray-500">(${t.resident_level})</span></div>
                        <div class="text-sm">${t.epaid}: ${t.epa_desc}</div>
                    </div>
                `).join('');
            }
            app.showView('view-instructor-list');
        }
    },

    openEvalForm: async (task) => {
        app.currentEvalTask = task;
        document.getElementById('eval-res-name').innerText = task.resident_name;
        document.getElementById('eval-epa-desc').innerText = `${task.epaid}: ${task.epa_desc}`;
        document.getElementById('eval-score').value = '';
        document.getElementById('eval-reason-section').classList.add('hidden');
        
        // ดึงเกณฑ์ Level อัตโนมัติจาก backend
        const data = await app.api({ action: 'get_eval_criteria', epaid: task.epaid, resident_level: task.resident_level });
        if(data) {
            app.currentEvalCriteria = data;
            document.getElementById('eval-min-level').innerText = data.minLevel;
            
            // สร้าง Checkbox เหตุผลรอไว้
            const checksDiv = document.getElementById('reason-checkboxes');
            checksDiv.innerHTML = data.reasons.map((r, idx) => `
                <label class="flex items-start space-x-2">
                    <input type="checkbox" value="${r.desc}" class="mt-1 reason-cb">
                    <span>${r.desc}</span>
                </label>
            `).join('');
            app.showView('view-eval-form');
        }
    },

    checkEvalScore: () => {
        const score = parseInt(document.getElementById('eval-score').value);
        if(!score) return;
        const minLevel = parseInt(app.currentEvalCriteria.minLevel);
        const reasonSec = document.getElementById('eval-reason-section');
        
        // Logic: ถ้าคะแนนน้อยกว่าเกณฑ์ ให้บังคับกรอกเหตุผล
        if(score < minLevel) {
            reasonSec.classList.remove('hidden');
            Swal.fire('ผลประเมินไม่ผ่านเกณฑ์', `เกณฑ์ของ ${app.currentEvalTask.resident_level} คือ Level ${minLevel}<br>กรุณาระบุเหตุผล`, 'info');
        } else {
            reasonSec.classList.add('hidden');
        }
    },

    submitEvaluation: async () => {
        const score = parseInt(document.getElementById('eval-score').value);
        if(!score) return Swal.fire('กรุณาระบุ', 'กรุณาเลือกคะแนนประเมิน', 'warning');
        
        const minLevel = parseInt(app.currentEvalCriteria.minLevel);
        let reasonsSelected = [];
        
        if (score < minLevel) {
            document.querySelectorAll('.reason-cb:checked').forEach(cb => reasonsSelected.push(cb.value));
            if(reasonsSelected.length === 0) return Swal.fire('บังคับกรอก', 'กรุณาเลือกเหตุผลที่ไม่ผ่านอย่างน้อย 1 ข้อ', 'warning');
        }

        const payload = {
            rowId: app.currentEvalTask.rowId,
            score: score,
            reason: reasonsSelected.join(', ')
        };

        const res = await app.api({ action: 'save_evaluation', payload: payload }, 'กำลังบันทึก...');
        if(res) {
            Swal.fire('สำเร็จ', res.message, 'success').then(() => app.loadInstructorTasks());
        }
    },

// ================== Staff Flow ==================
    loadDashboard: async () => {
        const res = await app.api({ action: 'get_dashboard_data', user: app.user }, 'กำลังดึงข้อมูล Dashboard...');
        if(res && res.success) {
            app.showView('view-staff-dashboard');
            const container = document.getElementById('dashboard-content');
            
            if(res.data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-4">ไม่มีข้อมูล Resident ในสถาบันนี้</p>';
                return;
            }

            container.innerHTML = res.data.map(r => `
                <div class="border rounded-lg shadow-sm bg-white overflow-hidden">
                    <div class="bg-blue-50 hover:bg-blue-100 p-4 font-bold cursor-pointer flex justify-between items-center transition-colors" onclick="app.toggleResidentDetails('${r.mdid}')">
                        <span class="text-blue-900">🧑‍⚕️ ${r.name} <span class="bg-blue-200 text-blue-800 text-xs px-2 py-1 rounded ml-2">${r.level}</span></span>
                        <span class="text-sm text-blue-600" id="icon-${r.mdid}">▼ เปิดดู</span>
                    </div>
                    
                    <div id="details-${r.mdid}" class="hidden p-3 text-xs sm:text-sm bg-white border-t">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700">
                                    <th class="p-2 border-b">รายการ (EPA/ACT)</th>
                                    <th class="p-2 border-b text-center">เป้าหมาย</th>
                                    <th class="p-2 border-b text-center">ผ่าน</th>
                                    <th class="p-2 border-b text-center">ไม่ผ่าน</th>
                                    <th class="p-2 border-b text-center">สถานะ</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${r.items.length === 0 ? `<tr><td colspan="5" class="p-2 text-center text-gray-500">ไม่มีรายการที่ต้องทำในชั้นปีนี้</td></tr>` : 
                                r.items.map(item => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-2 break-words">
                                            <span class="font-bold text-gray-800">${item.id}</span><br>
                                            <span class="text-gray-500 text-xs">${item.desc}</span>
                                        </td>
                                        <td class="p-2 text-center font-bold">${item.target}</td>
                                        <td class="p-2 text-center text-green-600 font-bold">${item.pass}</td>
                                        <td class="p-2 text-center text-red-500">${item.fail}</td>
                                        <td class="p-2 text-center">
                                            ${item.is_completed 
                                                ? '<span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-bold whitespace-nowrap">✅ ครบถ้วน</span>' 
                                                : '<span class="bg-orange-100 text-orange-800 px-2 py-1 rounded-full text-xs font-bold whitespace-nowrap">⏳ รอเก็บเคส</span>'}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');
        }
    },

    toggleResidentDetails: (mdid) => {
        const detailsDiv = document.getElementById(`details-${mdid}`);
        const iconSpan = document.getElementById(`icon-${mdid}`);
        if (detailsDiv.classList.contains('hidden')) {
            detailsDiv.classList.remove('hidden');
            iconSpan.innerText = '▲ ปิด';
        } else {
            detailsDiv.classList.add('hidden');
            iconSpan.innerText = '▼ เปิดดู';
        }
    }
    </script>
</body>
</html>
