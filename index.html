<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPA Skin App</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button.btn-danger { background-color: #f44336; }
        button.btn-secondary { background-color: #9e9e9e; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        .pending { color: orange; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    
    <div id="view-login">
        <h2 style="text-align: center;">เข้าสู่ระบบ</h2>
        <input type="number" id="mdid-input" placeholder="ระบุ MDID (ตัวเลขไม่เกิน 5 หลัก)" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5);" />
        <button onclick="login()">เข้าสู่ระบบ</button>
    </div>

    <div id="view-menu" class="hidden">
        <h2>สวัสดี <span id="user-name"></span></h2>
        <p>สถานะ: <span id="user-group"></span></p>
        <button onclick="showView('view-epa')">1. EPA</button>
        <button class="btn-secondary" onclick="alert('เมนู Activity กำลังพัฒนา')">2. Activity</button>
        <button class="btn-danger" onclick="logout()">ออกจากโปรแกรม</button>
    </div>

    <div id="view-epa" class="hidden">
        <h2>ระบบ EPA</h2>
        <button id="btn-create-epa" onclick="loadCreateEPA()" class="hidden">สร้างรายการใหม่</button>
        <button onclick="loadHistory()">ประวัติ / ประเมิน EPA</button>
        <button class="btn-secondary" onclick="showView('view-menu')">กลับหน้าหลัก</button>
    </div>

    <div id="view-epa-create" class="hidden">
        <h2>สร้างรายการ EPA ใหม่</h2>
        <label>เลือก EPA</label>
        <select id="select-epa"></select>
        
        <label>เลือก Instructor</label>
        <select id="select-instructor"></select>
        
        <button onclick="submitEPA()">Save ข้อมูล</button>
        <button class="btn-danger" onclick="showView('view-epa')">ยกเลิก</button>
    </div>

    <div id="view-epa-history" class="hidden">
        <h2>รายการ EPA</h2>
        <div id="history-list"></div>
        <button class="btn-secondary" onclick="showView('view-epa')">กลับ</button>
    </div>

    <div id="view-epa-evaluate" class="hidden">
        <h2>ประเมิน EPA</h2>
        <p id="eval-epa-desc"></p>
        <label>ผลการประเมิน (1-5)</label>
        <input type="number" id="eval-score" min="1" max="5" onchange="checkReasonNeeded()">
        
        <div id="reason-section" class="hidden">
            <label>เหตุผลที่ไม่ผ่าน (เลือกได้หลายข้อ)</label>
            <select id="select-reason" multiple size="4"></select>
        </div>
        
        <button onclick="submitEvaluation()">Save ประเมิน</button>
        <button class="btn-danger" onclick="showView('view-epa-history')">ยกเลิก</button>
    </div>

</div>

<script>
    // ** ใส่ URL ของ Google Apps Script ของคุณที่นี่ **
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0cXCqTIftkNLy4FwOBKYvwALyew2PYwe7zxarx78rHHBgHv_h-RW2mDyema-wRafy/exec'; 

    let epaEvalDescs = []; 

    document.addEventListener("DOMContentLoaded", function() {
      Swal.fire({
        title: 'กำลังโหลดข้อมูล...',
        allowEscapeKey: false,
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      // ดึงข้อมูลผ่าน Web App URL แทน google.script.run
      fetch(SCRIPT_URL + '?action=getLists')
        .then(response => response.json())
        .then(data => {
          onInitialLoadSuccess(data);
        })
        .catch(error => {
          onInitialLoadError(error);
        });
    });

    function onInitialLoadSuccess(data) {
      Swal.close(); 
      const select = document.getElementById('resultSelect');
      data.epaLevels.forEach(level => {
        if (level) {
          let opt = document.createElement('option');
          opt.value = level;
          opt.textContent = level;
          select.appendChild(opt);
        }
      });
      epaEvalDescs = data.evalDescs; 
    }

    function onInitialLoadError(error) {
      Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้: ' + error.message, 'error');
    }

    function processLogin() {
      const mdid = document.getElementById('mdidInput').value;
      if (mdid.length === 0) {
        Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาระบุ MDID เพื่อเข้าสู่ระบบ' });
        return;
      }
      
      Swal.fire({
        icon: 'success',
        title: 'เข้าสู่ระบบสำเร็จ',
        showConfirmButton: false,
        timer: 1000
      }).then(() => {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('evalSection').style.display = 'block';
        window.scrollTo(0, 0); 
      });
    }

    function logout() {
      document.getElementById('mdidInput').value = '';
      document.getElementById('currentEpaId').value = '';
      document.getElementById('resultSelect').value = '';
      document.getElementById('reasonSection').style.display = 'none';
      
      document.getElementById('evalSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
    }

    function renderCheckboxes() {
      const currentEpaId = document.getElementById('currentEpaId').value.trim().toUpperCase();
      const container = document.getElementById('reasonCheckboxes');
      container.innerHTML = ''; 

      if (currentEpaId === "") {
        container.innerHTML = '<span class="text-muted small">กรุณาระบุรหัส EPA ด้านบนเพื่อโหลดเหตุผล...</span>';
        return;
      }

      const filtered = epaEvalDescs.filter(item => item.epaid.toUpperCase() === currentEpaId);

      if (filtered.length === 0) {
        container.innerHTML = `<span class="text-muted small">ไม่พบรายการเหตุผลสำหรับรหัส "${currentEpaId}"</span>`;
        return;
      }

      filtered.forEach((item, index) => {
        let div = document.createElement('div');
        div.className = 'form-check mb-2';
        let chkId = 'chk_' + index;
        div.innerHTML = `
          <input class="form-check-input eval-reason-chk" type="checkbox" value="${item.desc}" id="${chkId}">
          <label class="form-check-label" for="${chkId}">
            ${item.desc}
          </label>
        `;
        container.appendChild(div);
      });
    }

    function toggleReasonSection() {
      const result = document.getElementById('resultSelect').value;
      const reasonSection = document.getElementById('reasonSection');
      
      if (result.includes("Level 1") || result.includes("Level 2") || result.includes("Not Entrustable") || result === "Fail") {
        reasonSection.style.display = 'block';
      } else {
        reasonSection.style.display = 'none';
        document.querySelectorAll('.eval-reason-chk').forEach(cb => cb.checked = false);
      }
    }

    function submitData() {
      const mdid = document.getElementById('mdidInput').value;
      const epaId = document.getElementById('currentEpaId').value;
      const result = document.getElementById('resultSelect').value;
      
      if (!epaId) {
        Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาระบุรหัส EPA' });
        return;
      }
      if (!result) {
        Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือกระดับ Result' });
        return;
      }

      let selectedReasons = [];
      document.querySelectorAll('.eval-reason-chk:checked').forEach(cb => {
        selectedReasons.push(cb.value);
      });

      if (document.getElementById('reasonSection').style.display === 'block' && selectedReasons.length === 0) {
        Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือกเหตุผลที่ไม่ผ่านอย่างน้อย 1 ข้อ' });
        return;
      }

      const payload = {
        mdid: mdid,
        epaId: epaId,
        result: result,
        reasons: selectedReasons.join(', ')
      };

      Swal.fire({
        title: 'กำลังบันทึกข้อมูล...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      // ส่งข้อมูลผ่าน API ด้วยวิธี POST
      fetch(SCRIPT_URL, {
        method: 'POST',
        // ส่งเป็น plain text เพื่อหลีกเลี่ยงปัญหา CORS preflight
        body: JSON.stringify({ action: 'saveEval', data: payload }),
        headers: {
          "Content-Type": "text/plain;charset=utf-8",
        }
      })
      .then(response => response.json())
      .then(resultData => {
        if (resultData.status === 'success') {
          Swal.fire('สำเร็จ!', 'บันทึกผลการประเมินเรียบร้อยแล้ว', 'success').then(() => {
            document.getElementById('currentEpaId').value = '';
            document.getElementById('resultSelect').value = '';
            renderCheckboxes();
            toggleReasonSection();
          });
        } else {
          Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดจากเซิร์ฟเวอร์', 'error');
        }
      })
      .catch(error => {
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อมูลได้: ' + error.message, 'error');
      });
    }
  </script>

</body>
</html>
