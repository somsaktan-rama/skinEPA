<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rama Dermatology - EPA Evaluation</title>
  
  <!-- Bootstrap 5 & SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
    .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-primary { background-color: #0d6efd; border: none; padding: 12px; font-weight: 600; }
    #evalSection { display: none; }
    .checkbox-container {
      background-color: #fff; border: 1px solid #dee2e6; border-radius: 8px;
      padding: 15px; max-height: 250px; overflow-y: auto;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Login Section -->
    <div id="loginSection" class="card p-4">
      <div class="text-center mb-4">
        <h4 class="fw-bold text-primary">Instructor Login</h4>
        <p class="text-muted small">ระบบประเมิน EPA</p>
      </div>

      <div class="mb-4">
        <label for="mdidInput" class="form-label fw-bold">ระบุ MDID (5 หลัก)</label>
        <input type="tel" id="mdidInput" 
               class="form-control form-control-lg text-center fs-3 tracking-widest" 
               pattern="[0-9]*" inputmode="numeric" maxlength="5" 
               oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5);" 
               placeholder="-----" autocomplete="off">
      </div>
      <button class="btn btn-primary w-100 rounded-pill fs-5" onclick="processLogin()">เข้าสู่ระบบ</button>
    </div>

    <!-- Evaluation Form Section -->
    <div id="evalSection" class="card p-4 mt-3">
      <h4 class="fw-bold mb-4 border-bottom pb-2">แบบประเมิน EPA</h4>
      
      <div class="mb-3">
        <label class="form-label fw-bold text-secondary">รหัส EPA ที่ต้องการประเมิน:</label>
        <input type="text" id="currentEpaId" class="form-control" placeholder="เช่น EPA01" onkeyup="renderCheckboxes()" onchange="renderCheckboxes()">
        <small class="text-muted">พิมพ์รหัสเพื่อกรองเหตุผลด้านล่าง</small>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Result (EPA Level):</label>
        <select id="resultSelect" class="form-select form-select-lg" onchange="toggleReasonSection()">
          <option value="">-- กรุณาเลือกระดับ --</option>
        </select>
      </div>

      <div id="reasonSection" class="mb-4" style="display: none;">
        <label class="form-label fw-bold text-danger">ระบุเหตุผลที่ไม่ผ่าน (เลือกได้หลายข้อ):</label>
        <div id="reasonCheckboxes" class="checkbox-container">
          <span class="text-muted small">กรุณาระบุรหัส EPA ด้านบนเพื่อโหลดเหตุผล...</span>
        </div>
      </div>

      <button class="btn btn-success w-100 rounded-pill fs-5 mt-2" onclick="submitData()">บันทึกผลการประเมิน</button>
      <button class="btn btn-light w-100 rounded-pill mt-2 text-muted" onclick="logout()">ออกจากระบบ</button>
    </div>

  </div>

  <script>
    // ==========================================
    // ⚠️ ใส่ URL ของ Web App จาก Google Apps Script ตรงนี้ ⚠️
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0cXCqTIftkNLy4FwOBKYvwALyew2PYwe7zxarx78rHHBgHv_h-RW2mDyema-wRafy/exec'; 

    let epaEvalDescs = []; 

    // ดึงข้อมูลเมื่อโหลดหน้า
    document.addEventListener("DOMContentLoaded", function() {
      Swal.fire({
        title: 'กำลังโหลดข้อมูล...',
        allowEscapeKey: false,
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      // ดึงข้อมูลผ่าน GET
      fetch(SCRIPT_URL + '?action=getLists')
        .then(response => response.json())
        .then(data => {
          Swal.close(); 
          const select = document.getElementById('resultSelect');
          data.epaLevels.forEach(level => {
            if (level) {
              let opt = document.createElement('option');
              opt.value = level;
              opt.textContent = level;
              select.appendChild(opt);
            }
          });
          epaEvalDescs = data.evalDescs; 
        })
        .catch(error => {
          Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้: ' + error.message, 'error');
        });
    });

    // เข้าสู่ระบบ
    function processLogin() {
      const mdid = document.getElementById('mdidInput').value;
      if (mdid.length === 0) {
        Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาระบุ MDID เพื่อเข้าสู่ระบบ' });
        return;
      }
      
      Swal.fire({ icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', showConfirmButton: false, timer: 1000 }).then(() => {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('evalSection').style.display = 'block';
        window.scrollTo(0, 0); 
      });
    }

    // ออกจากระบบ
    function logout() {
      document.getElementById('mdidInput').value = '';
      document.getElementById('currentEpaId').value = '';
      document.getElementById('resultSelect').value = '';
      document.getElementById('reasonSection').style.display = 'none';
      document.getElementById('evalSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
    }

    // สร้าง Checkbox เหตุผลตาม epaId
    function renderCheckboxes() {
      const currentEpaId = document.getElementById('currentEpaId').value.trim().toUpperCase();
      const container = document.getElementById('reasonCheckboxes');
      container.innerHTML = ''; 

      if (currentEpaId === "") {
        container.innerHTML = '<span class="text-muted small">กรุณาระบุรหัส EPA ด้านบนเพื่อโหลดเหตุผล...</span>';
        return;
      }

      const filtered = epaEvalDescs.filter(item => item.epaid.toUpperCase() === currentEpaId);

      if (filtered.length === 0) {
        container.innerHTML = `<span class="text-muted small">ไม่พบรายการเหตุผลสำหรับรหัส "${currentEpaId}"</span>`;
        return;
      }

      filtered.forEach((item, index) => {
        let div = document.createElement('div');
        div.className = 'form-check mb-2';
        let chkId = 'chk_' + index;
        div.innerHTML = `
          <input class="form-check-input eval-reason-chk" type="checkbox" value="${item.desc}" id="${chkId}">
          <label class="form-check-label" for="${chkId}">${item.desc}</label>
        `;
        container.appendChild(div);
      });
    }

    // ซ่อน/แสดง กล่องเหตุผลที่ไม่ผ่าน
    function toggleReasonSection() {
      const result = document.getElementById('resultSelect').value;
      const reasonSection = document.getElementById('reasonSection');
      
      // ปรับคำเช็คตรงนี้ให้ตรงกับข้อมูลในชีต
      if (result.includes("Level 1") || result.includes("Level 2") || result.includes("Not Entrustable") || result === "Fail") {
        reasonSection.style.display = 'block';
      } else {
        reasonSection.style.display = 'none';
        document.querySelectorAll('.eval-reason-chk').forEach(cb => cb.checked = false);
      }
    }

    // ส่งข้อมูลไปเซฟที่ GAS
    function submitData() {
      const mdid = document.getElementById('mdidInput').value;
      const epaId = document.getElementById('currentEpaId').value;
      const result = document.getElementById('resultSelect').value;
      
      if (!epaId || !result) {
        Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาระบุรหัส EPA และระดับการประเมิน' });
        return;
      }

      let selectedReasons = [];
      document.querySelectorAll('.eval-reason-chk:checked').forEach(cb => selectedReasons.push(cb.value));

      if (document.getElementById('reasonSection').style.display === 'block' && selectedReasons.length === 0) {
        Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือกเหตุผลที่ไม่ผ่านอย่างน้อย 1 ข้อ' });
        return;
      }

      const payload = {
        mdid: mdid,
        epaId: epaId,
        result: result,
        reasons: selectedReasons.join(', ')
      };

      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

      // ส่งแบบ POST (ใช้ text/plain เพื่อป้องกันปัญหา CORS กับ GAS)
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveEval', data: payload }),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      })
      .then(response => response.json())
      .then(resultData => {
        if (resultData.status === 'success') {
          Swal.fire('สำเร็จ!', 'บันทึกผลการประเมินเรียบร้อยแล้ว', 'success').then(() => {
            document.getElementById('currentEpaId').value = '';
            document.getElementById('resultSelect').value = '';
            renderCheckboxes();
            toggleReasonSection();
          });
        } else {
          Swal.fire('ข้อผิดพลาด', 'จากเซิร์ฟเวอร์: ' + resultData.message, 'error');
        }
      })
      .catch(error => Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อมูลได้: ' + error.message, 'error'));
    }
  </script>
</body>
</html>
